name: Build SMS Myanmar App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable

      - name: Create Flutter project
        run: |
          flutter create --org com.example --project-name sms_myanmar /tmp/sms_base

      - name: Copy source files
        run: |
          cp -rv lib/ /tmp/sms_base/lib/
          cp -v pubspec.yaml /tmp/sms_base/pubspec.yaml

      - name: Setup assets
        run: |
          mkdir -p /tmp/sms_base/assets/fonts
          mkdir -p /tmp/sms_base/assets/images
          touch /tmp/sms_base/assets/fonts/Padauk-Regular.ttf
          touch /tmp/sms_base/assets/fonts/Padauk-Bold.ttf

      - name: pub get
        working-directory: /tmp/sms_base
        run: flutter pub get 2>&1

      - name: build apk
        working-directory: /tmp/sms_base
        run: flutter build apk --release --no-tree-shake-icons 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sms-myanmar-apk
          path: /tmp/sms_base/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
