name: Build SMS Myanmar App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Create font directory
        run: mkdir -p assets/fonts

    - name: Download Padauk Regular
  run: |
    mkdir -p assets/fonts
    curl -fL "https://github.com/google/fonts/raw/main/ofl/padauk/Padauk-Regular.ttf" -o assets/fonts/Padauk-Regular.ttf || true

- name: Download Padauk Bold
  run: |
    curl -fL "https://github.com/google/fonts/raw/main/ofl/padauk/Padauk-Bold.ttf" -o assets/fonts/Padauk-Bold.ttf || true
      - name: Flutter pub get
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sms-myanmar-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
