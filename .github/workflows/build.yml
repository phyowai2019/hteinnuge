name: Build SMS Myanmar App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Create Flutter project
        run: |
          cd /tmp
          flutter create --org com.example --project-name sms_myanmar sms_base
          echo "Flutter project created"

      - name: Copy lib files into Flutter project
        run: |
          cp -r lib/ /tmp/sms_base/lib/
          cp pubspec.yaml /tmp/sms_base/pubspec.yaml
          echo "Lib files copied"

      - name: Create font directory and download fonts
        run: |
          mkdir -p /tmp/sms_base/assets/fonts
          mkdir -p /tmp/sms_base/assets/images
          curl -fL "https://fonts.gstatic.com/s/padauk/v16/RrQRboJg-id7OnbBW0poSFqS.ttf" -o /tmp/sms_base/assets/fonts/Padauk-Regular.ttf || true
          curl -fL "https://fonts.gstatic.com/s/padauk/v16/RrQSboJg-id7Onb512DE1BQBCQ.ttf" -o /tmp/sms_base/assets/fonts/Padauk-Bold.ttf || true
          [ -f /tmp/sms_base/assets/fonts/Padauk-Regular.ttf ] || touch /tmp/sms_base/assets/fonts/Padauk-Regular.ttf
          [ -f /tmp/sms_base/assets/fonts/Padauk-Bold.ttf ] || touch /tmp/sms_base/assets/fonts/Padauk-Bold.ttf
          ls -la /tmp/sms_base/assets/fonts/

      - name: Flutter pub get
        working-directory: /tmp/sms_base
        run: flutter pub get

      - name: Flutter analyze
        working-directory: /tmp/sms_base
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build APK
        working-directory: /tmp/sms_base
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sms-myanmar-apk
          path: /tmp/sms_base/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
